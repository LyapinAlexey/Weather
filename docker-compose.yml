services:
  web:
    build:
      context: .
      dockerfile: WEB/Dockerfile
    ports: 
      - "${FLASK_PORT}:${FLASK_PORT}"
    env_file: .env
    depends_on: 
      - weather_db
  weather_db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
  cli:
    build:
      context: .
      dockerfile: CLI/Dockerfile
    env_file: .env
    depends_on: 
      - weather_db
    stdin_open: true
    tty: true
volumes:
  postgres_data: